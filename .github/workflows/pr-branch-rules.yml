name: PR Branch Rules Enforcement

on:
  pull_request:
    branches:
      - "**"
    types: [opened, synchronize, reopened]

jobs:
  branch-validation:
    name: branch-validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate PR branches
        shell: bash
        run: |
          echo "Starting PR branch validation..."

          SOURCE_BRANCH="${{ github.event.pull_request.head.ref }}"
          DEST_BRANCH="${{ github.event.pull_request.base.ref }}"

          echo "Source: $SOURCE_BRANCH"
          echo "Destination: $DEST_BRANCH"

          fail() { echo "❌ ERROR: $1"; exit 1; }

          if [[ "$SOURCE_BRANCH" =~ ^sync/ ]]; then
            if [[ "$SOURCE_BRANCH" != "sync/develop-to-qa" ]] && [[ "$SOURCE_BRANCH" != "sync/qa-to-main" ]]; then
              fail "Unknown sync branch '$SOURCE_BRANCH'. Only 'sync/develop-to-qa' and 'sync/qa-to-main' are allowed."
            fi
            if [[ "$SOURCE_BRANCH" == "sync/develop-to-qa" ]] && [[ "$DEST_BRANCH" != "qa" ]]; then
              fail "Branch 'sync/develop-to-qa' must target 'qa'."
            fi
            if [[ "$SOURCE_BRANCH" == "sync/qa-to-main" ]] && [[ "$DEST_BRANCH" != "main" ]]; then
              fail "Branch 'sync/qa-to-main' must target 'main'."
            fi
            if [[ "$SOURCE_BRANCH" == "sync/develop-to-qa" ]]; then
              git fetch origin develop
              BEHIND=$(git rev-list --count HEAD..origin/develop)
              if [ "$BEHIND" -gt 0 ]; then
                fail "Branch 'sync/develop-to-qa' is not fully up to date with 'develop'. Merge develop into this branch first."
              fi
            fi
            if [[ "$SOURCE_BRANCH" == "sync/qa-to-main" ]]; then
              git fetch origin qa
              BEHIND=$(git rev-list --count HEAD..origin/qa)
              if [ "$BEHIND" -gt 0 ]; then
                fail "Branch 'sync/qa-to-main' is not fully up to date with 'qa'. Merge qa into this branch first."
              fi
            fi
            echo "✅ Sync branch validated successfully."
            exit 0
          fi

          if [[ ! "$SOURCE_BRANCH" =~ ^(feature|bugfix|hotfix)/ ]]; then
            fail "Branch '$SOURCE_BRANCH' is invalid. New branches must start with 'feature/', 'bugfix/', or 'hotfix/'."
          fi

          if [[ "$DEST_BRANCH" != "develop" ]]; then
            fail "Branch '$SOURCE_BRANCH' must target 'develop'. Only 'sync/develop-to-qa' can target 'qa' and only 'sync/qa-to-main' can target 'main'."
          fi

          echo "✅ PR branch rules ran successfully."

      - name: Check branch is up to date
        shell: bash
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }}
          BEHIND=$(git rev-list --count HEAD..origin/${{ github.event.pull_request.base.ref }})
          if [ "$BEHIND" -gt 0 ]; then
            echo "❌ ERROR: This branch is $BEHIND commit(s) behind '${{ github.event.pull_request.base.ref }}'. Update your branch before merging."
            exit 1
          fi
          echo "✅ Branch is up to date with '${{ github.event.pull_request.base.ref }}'."
