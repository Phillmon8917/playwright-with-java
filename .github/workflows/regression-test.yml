name: Regression Tests

permissions:
  contents: write
  actions: write
  pages: write
  id-token: write

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      tag:
        description: "Test tag to run"
        required: false
        default: "regression"
        type: choice
        options:
          - regression
          - sanity
          - guest
          - authentication
          - customer
          - agent
          - admin
      branch:
        description: "Branch to run on"
        required: false
        default: "qa"
        type: choice
        options:
          - qa
          - develop
          - main
      base_url:
        description: "Base URL"
        required: false
        default: "https://phptravels.net/"
      action_timeout:
        description: "Action timeout (ms)"
        required: false
        default: "80000"
      navigation_timeout:
        description: "Navigation timeout (ms)"
        required: false
        default: "120000"
      test_timeout:
        description: "Test timeout (ms)"
        required: false
        default: "360000"

jobs:
  resolve-branch:
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.set.outputs.branch }}
    steps:
      - name: Resolve target branch
        id: set
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "branch=qa" >> $GITHUB_OUTPUT
          else
            echo "branch=${{ inputs.branch != '' && inputs.branch || 'qa' }}" >> $GITHUB_OUTPUT
          fi

  authenticate:
    needs: resolve-branch
    runs-on: ubuntu-latest
    env:
      CI: true
      ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      CUSTOMER_USERNAME: ${{ secrets.CUSTOMER_USERNAME }}
      CUSTOMER_PASSWORD: ${{ secrets.CUSTOMER_PASSWORD }}
      AGENT_USERNAME: ${{ secrets.AGENT_USERNAME }}
      AGENT_PASSWORD: ${{ secrets.AGENT_PASSWORD }}
      BASE_URL: ${{ inputs.base_url != '' && inputs.base_url || vars.BASE_URL }}
      ACTION_TIMEOUT: ${{ inputs.action_timeout != '' && inputs.action_timeout || vars.ACTION_TIMEOUT }}
      NAVIGATION_TIMEOUT: ${{ inputs.navigation_timeout != '' && inputs.navigation_timeout || vars.NAVIGATION_TIMEOUT }}
      TEST_TIMEOUT: ${{ inputs.test_timeout != '' && inputs.test_timeout || vars.TEST_TIMEOUT }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-branch.outputs.branch }}

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Install Playwright browsers
        run: mvn exec:java -e -Dexec.mainClass=com.microsoft.playwright.CLI -Dexec.args="install --with-deps"

      - name: Run authentication
        run: mvn test -Dsurefire.failIfNoSpecifiedTests=false -Dincludes="**/AuthRunner.java" -Dskip.main.tests=true

      - name: Upload storage state
        uses: actions/upload-artifact@v4
        with:
          name: storage-state
          path: storage/
          retention-days: 1

  test-shard:
    needs: [resolve-branch, authenticate]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5, 6]
    env:
      CI: true
      DATA_REPO_TOKEN: ${{ secrets.DATA_REPO_TOKEN }}
      DATA_REPO_OWNER: Phillmon8917
      DATA_REPO_NAME: phptravels-reports
      DATA_REPO_BRANCH: java-reports
      ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      CUSTOMER_USERNAME: ${{ secrets.CUSTOMER_USERNAME }}
      CUSTOMER_PASSWORD: ${{ secrets.CUSTOMER_PASSWORD }}
      AGENT_USERNAME: ${{ secrets.AGENT_USERNAME }}
      AGENT_PASSWORD: ${{ secrets.AGENT_PASSWORD }}
      BASE_URL: ${{ inputs.base_url != '' && inputs.base_url || vars.BASE_URL }}
      ACTION_TIMEOUT: ${{ inputs.action_timeout != '' && inputs.action_timeout || vars.ACTION_TIMEOUT }}
      NAVIGATION_TIMEOUT: ${{ inputs.navigation_timeout != '' && inputs.navigation_timeout || vars.NAVIGATION_TIMEOUT }}
      TEST_TIMEOUT: ${{ inputs.test_timeout != '' && inputs.test_timeout || vars.TEST_TIMEOUT }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-branch.outputs.branch }}

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Install Playwright browsers
        run: mvn exec:java -e -Dexec.mainClass=com.microsoft.playwright.CLI -Dexec.args="install --with-deps"

      - name: Download storage state
        uses: actions/download-artifact@v4
        with:
          name: storage-state
          path: storage/

      - name: Run shard ${{ matrix.shard }}
        id: run_tests
        run: |
          set -o pipefail
          mvn test -Dsurefire.failIfNoSpecifiedTests=false \
            -Dskip.auth.tests=true \
            -Dgroups="${{ inputs.tag != '' && inputs.tag || 'regression' }} & shard${{ matrix.shard }}" \
            | tee shard-output.txt

      - name: Parse shard results
        if: always()
        id: parse
        run: |
          TESTS=$(grep -oP 'Tests run: \K[0-9]+' shard-output.txt | tail -1 || echo "0")
          FAILURES=$(grep -oP 'Failures: \K[0-9]+' shard-output.txt | tail -1 || echo "0")
          ERRORS=$(grep -oP 'Errors: \K[0-9]+' shard-output.txt | tail -1 || echo "0")
          SKIPPED=$(grep -oP 'Skipped: \K[0-9]+' shard-output.txt | tail -1 || echo "0")
          PASSED=$((TESTS - FAILURES - ERRORS - SKIPPED))
          echo "tests=$TESTS"       >> $GITHUB_OUTPUT
          echo "passed=$PASSED"     >> $GITHUB_OUTPUT
          echo "failures=$FAILURES" >> $GITHUB_OUTPUT
          echo "errors=$ERRORS"     >> $GITHUB_OUTPUT
          echo "skipped=$SKIPPED"   >> $GITHUB_OUTPUT
          if [ "$FAILURES" -gt 0 ] || [ "$ERRORS" -gt 0 ]; then
            echo "❌ Shard ${{ matrix.shard }} failed: $FAILURES failure(s), $ERRORS error(s)"
            exit 1
          fi

      - name: Write shard summary
        if: always()
        run: |
          STATUS="${{ steps.run_tests.outcome == 'success' && '✅ Passed' || '❌ Failed' }}"
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## Shard ${{ matrix.shard }} Summary
          | Field | Value |
          |-------|-------|
          | Status | $STATUS |
          | Total Tests | ${{ steps.parse.outputs.tests }} |
          | ✅ Passed | ${{ steps.parse.outputs.passed }} |
          | ❌ Failed | ${{ steps.parse.outputs.failures }} |
          | 🔴 Errors | ${{ steps.parse.outputs.errors }} |
          | ⏭️ Skipped | ${{ steps.parse.outputs.skipped }} |
          EOF

      - name: Save shard result
        if: always()
        run: |
          echo "${{ matrix.shard }},${{ steps.parse.outputs.tests }},${{ steps.parse.outputs.passed }},${{ steps.parse.outputs.failures }},${{ steps.parse.outputs.errors }},${{ steps.parse.outputs.skipped }}" \
            > shard-result-${{ matrix.shard }}.txt

      - name: Upload shard result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shard-result-${{ matrix.shard }}
          path: shard-result-${{ matrix.shard }}.txt

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-shard-${{ matrix.shard }}
          path: target/allure-results/
          retention-days: 1

  build-report:
    needs: [resolve-branch, test-shard]
    runs-on: ubuntu-latest
    if: always()
    env:
      CI: true
      DATA_REPO_TOKEN: ${{ secrets.DATA_REPO_TOKEN }}
      DATA_REPO_OWNER: Phillmon8917
      DATA_REPO_NAME: phptravels-reports
      DATA_REPO_BRANCH: java-reports

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-branch.outputs.branch }}

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Download all Allure results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-shard-*
          merge-multiple: true
          path: target/allure-results/

      - name: Download all shard results
        uses: actions/download-artifact@v4
        with:
          pattern: shard-result-*
          merge-multiple: true
          path: shard-results/

      - name: Generate Allure report
        run: mvn allure:report

      - name: Compile project
        run: mvn compile

      - name: Build monthly report
        run: mvn exec:java -Dexec.mainClass=report.BuildReport

      - name: Load monthly totals
        if: always()
        id: monthly
        run: |
          TESTS=$(python3    -c "import json; d=json.load(open('src/dist/monthly-totals.json')); print(d['tests'])")
          PASSED=$(python3   -c "import json; d=json.load(open('src/dist/monthly-totals.json')); print(d['passed'])")
          FAILURES=$(python3 -c "import json; d=json.load(open('src/dist/monthly-totals.json')); print(d['failures'])")
          ERRORS=$(python3   -c "import json; d=json.load(open('src/dist/monthly-totals.json')); print(d['errors'])")
          SKIPPED=$(python3  -c "import json; d=json.load(open('src/dist/monthly-totals.json')); print(d['skipped'])")
          PASS_RATE=$(python3 -c "import json; d=json.load(open('src/dist/monthly-totals.json')); print(d['passRate'])")
          RUNS=$(python3     -c "import json; d=json.load(open('src/dist/monthly-totals.json')); print(d['runs'])")
          echo "tests=$TESTS"         >> $GITHUB_OUTPUT
          echo "passed=$PASSED"       >> $GITHUB_OUTPUT
          echo "failures=$FAILURES"   >> $GITHUB_OUTPUT
          echo "errors=$ERRORS"       >> $GITHUB_OUTPUT
          echo "skipped=$SKIPPED"     >> $GITHUB_OUTPUT
          echo "pass_rate=$PASS_RATE" >> $GITHUB_OUTPUT
          echo "runs=$RUNS"           >> $GITHUB_OUTPUT

      - name: Aggregate shard totals
        if: always()
        id: aggregate
        run: |
          TOTAL_TESTS=0; TOTAL_PASSED=0; TOTAL_FAILURES=0; TOTAL_ERRORS=0; TOTAL_SKIPPED=0
          for f in shard-results/*.txt; do
            IFS=',' read -r shard tests passed failures errors skipped < "$f"
            TOTAL_TESTS=$((TOTAL_TESTS + tests))
            TOTAL_PASSED=$((TOTAL_PASSED + passed))
            TOTAL_FAILURES=$((TOTAL_FAILURES + failures))
            TOTAL_ERRORS=$((TOTAL_ERRORS + errors))
            TOTAL_SKIPPED=$((TOTAL_SKIPPED + skipped))
          done
          echo "tests=$TOTAL_TESTS"       >> $GITHUB_OUTPUT
          echo "passed=$TOTAL_PASSED"     >> $GITHUB_OUTPUT
          echo "failures=$TOTAL_FAILURES" >> $GITHUB_OUTPUT
          echo "errors=$TOTAL_ERRORS"     >> $GITHUB_OUTPUT
          echo "skipped=$TOTAL_SKIPPED"   >> $GITHUB_OUTPUT

      - name: Fail build on shard errors
        if: always()
        run: |
          FAILURES=${{ steps.aggregate.outputs.failures }}
          ERRORS=${{ steps.aggregate.outputs.errors }}
          if [ "$FAILURES" -gt 0 ] || [ "$ERRORS" -gt 0 ]; then
            echo "❌ Regression failed: $FAILURES failure(s), $ERRORS error(s) across all shards"
            exit 1
          fi

      - name: Set run metadata
        if: always()
        run: |
          TESTS=${{ steps.aggregate.outputs.tests }}
          PASSED=${{ steps.aggregate.outputs.passed }}
          FAILURES=${{ steps.aggregate.outputs.failures }}
          ERRORS=${{ steps.aggregate.outputs.errors }}
          SKIPPED=${{ steps.aggregate.outputs.skipped }}
          EXECUTED=$((TESTS - SKIPPED))
          PASS_RATE=0
          [ "$EXECUTED" -gt 0 ] && PASS_RATE=$(echo "scale=1; $PASSED * 100 / $EXECUTED" | bc)
          [ "$FAILURES" -eq 0 ] && [ "$ERRORS" -eq 0 ] && STATUS="passed" || STATUS="failed"

          echo "RUN_ID=${{ github.run_id }}"                                            >> $GITHUB_ENV
          echo "RUN_DATE=$(date -u '+%Y-%m-%dT%H:%M:%SZ')"                             >> $GITHUB_ENV
          echo "REPORT_DATE=$(date -u '+%Y-%m-%d %H:%M UTC')"                          >> $GITHUB_ENV
          echo "META_BRANCH=${{ needs.resolve-branch.outputs.branch }}"                 >> $GITHUB_ENV
          echo "META_TAG=${{ inputs.tag != '' && inputs.tag || 'regression' }}"         >> $GITHUB_ENV
          echo "META_TRIGGER=${{ github.event_name }}"                                  >> $GITHUB_ENV
          echo "META_TESTS=$TESTS"                                                      >> $GITHUB_ENV
          echo "META_PASSED=$PASSED"                                                    >> $GITHUB_ENV
          echo "META_FAILURES=$FAILURES"                                                >> $GITHUB_ENV
          echo "META_ERRORS=$ERRORS"                                                    >> $GITHUB_ENV
          echo "META_SKIPPED=$SKIPPED"                                                  >> $GITHUB_ENV
          echo "META_STATUS=$STATUS"                                                    >> $GITHUB_ENV
          echo "META_PASS_RATE=$PASS_RATE"                                              >> $GITHUB_ENV

      - name: Write final run summary
        if: always()
        run: |
          PASS_RATE=${{ env.META_PASS_RATE }}
          [ "${{ env.META_FAILURES }}" -eq 0 ] && [ "${{ env.META_ERRORS }}" -eq 0 ] \
            && OVERALL="✅ All Passed" || OVERALL="❌ Some Failed"

          cat >> $GITHUB_STEP_SUMMARY << EOF
          # 🧪 Regression Run Summary
          | Field | Value |
          |-------|-------|
          | 📅 Date | ${{ env.REPORT_DATE }} |
          | 🌿 Branch | \`${{ env.META_BRANCH }}\` |
          | 🏷️ Test Type | \`${{ env.META_TAG }}\` |
          | 🔀 Trigger | \`${{ env.META_TRIGGER }}\` |
          | 🌐 Base URL | ${{ env.BASE_URL || vars.BASE_URL }} |
          | 📊 Overall Status | $OVERALL |

          ## 📈 Results Breakdown
          | Metric | Count |
          |--------|-------|
          | Total Tests | ${{ env.META_TESTS }} |
          | ✅ Passed | ${{ env.META_PASSED }} |
          | ❌ Failed | ${{ env.META_FAILURES }} |
          | 🔴 Errors | ${{ env.META_ERRORS }} |
          | ⏭️ Skipped | ${{ env.META_SKIPPED }} |
          | 📊 Pass Rate | $PASS_RATE% |

          ## 🗂️ Shard Breakdown
          | Shard | Tests | Passed | Failed | Errors | Skipped |
          |-------|-------|--------|--------|--------|---------|
          EOF

          for f in shard-results/*.txt; do
            IFS=',' read -r shard tests passed failures errors skipped < "$f"
            echo "| Shard $shard | $tests | $passed | $failures | $errors | $skipped |" >> $GITHUB_STEP_SUMMARY
          done

          cat >> $GITHUB_STEP_SUMMARY << EOF

          ## 🔗 Reports
          | Report | Link |
          |--------|------|
          | Regression Report | [View](https://Phillmon8917.github.io/phptravels-reports/regression-history.html) |
          | Monthly Report | [View](https://Phillmon8917.github.io/phptravels-reports/monthly-history.html) |
          EOF

      - name: Checkout gh-pages from phptravels-reports
        if: always()
        uses: actions/checkout@v4
        with:
          repository: Phillmon8917/phptravels-reports
          ref: gh-pages
          path: gh-pages
          token: ${{ secrets.DATA_REPO_TOKEN }}
        continue-on-error: true

      - name: Assemble Pages directory
        if: always()
        run: |
          RUN_ID="${{ env.RUN_ID }}"

          mkdir -p "gh-pages/regression-reports/${RUN_ID}"
          cp -r target/site/allure-maven-plugin/. "gh-pages/regression-reports/${RUN_ID}/"

          mkdir -p "gh-pages/monthly-reports/${RUN_ID}"
          cp src/dist/report.html "gh-pages/monthly-reports/${RUN_ID}/index.html"

          mkdir -p gh-pages/regression-report
          cp -r target/site/allure-maven-plugin/. gh-pages/regression-report/

          mkdir -p gh-pages/monthly-report
          cp src/dist/report.html gh-pages/monthly-report/index.html

          [ -f gh-pages/regression-runs.json ] || echo "[]" > gh-pages/regression-runs.json
          [ -f gh-pages/monthly-runs.json    ] || echo "[]" > gh-pages/monthly-runs.json
          [ -f gh-pages/sanity-runs.json     ] || echo "[]" > gh-pages/sanity-runs.json

          python3 - << PYEOF
          import json, os, shutil

          run_id   = os.environ['RUN_ID']
          run_date = os.environ['RUN_DATE']
          branch   = os.environ['META_BRANCH']
          tag      = os.environ['META_TAG']
          trigger  = os.environ['META_TRIGGER']
          status   = os.environ['META_STATUS']

          with open('src/dist/monthly-totals.json') as f:
            t = json.load(f)

          monthly_status = 'passed' if int(t['failures']) == 0 and int(t['errors']) == 0 else 'failed'

          with open('gh-pages/regression-runs.json') as f:
            reg_runs = json.load(f)
          reg_runs.insert(0, {
            'id': run_id, 'date': run_date, 'branch': branch, 'tag': tag,
            'trigger': trigger, 'status': status,
            'tests': int(os.environ['META_TESTS']),
            'passed': int(os.environ['META_PASSED']),
            'failures': int(os.environ['META_FAILURES']),
            'errors': int(os.environ['META_ERRORS']),
            'skipped': int(os.environ['META_SKIPPED']),
            'passRate': os.environ['META_PASS_RATE'],
            'reportPath': f'regression-reports/{run_id}/index.html'
          })
          if len(reg_runs) > 50:
            for r in reg_runs[50:]:
              old = 'gh-pages/' + r['reportPath'].replace('/index.html','')
              if os.path.isdir(old): shutil.rmtree(old)
            reg_runs = reg_runs[:50]
          with open('gh-pages/regression-runs.json', 'w') as f:
            json.dump(reg_runs, f, indent=2)

          with open('gh-pages/monthly-runs.json') as f:
            monthly = json.load(f)
          monthly.insert(0, {
            'id': run_id, 'date': run_date, 'branch': branch, 'tag': tag,
            'trigger': trigger, 'status': monthly_status,
            'tests': t['tests'], 'passed': t['passed'],
            'failures': t['failures'], 'errors': t['errors'],
            'skipped': t['skipped'], 'passRate': t['passRate'],
            'reportPath': f'monthly-reports/{run_id}/index.html'
          })
          if len(monthly) > 50:
            for r in monthly[50:]:
              old = 'gh-pages/' + r['reportPath'].replace('/index.html','')
              if os.path.isdir(old): shutil.rmtree(old)
            monthly = monthly[:50]
          with open('gh-pages/monthly-runs.json', 'w') as f:
            json.dump(monthly, f, indent=2)
          PYEOF

          TMPL=".github/templates/history.html"
          REPORT_DATE="${{ env.REPORT_DATE }}"

          sed -e 's|%%TITLE%%|Regression|g' \
              -e 's|%%ICON%%|🧪|g' \
              -e 's|%%ACCENT%%|#4fffb0|g' \
              -e "s|%%DATE%%|${REPORT_DATE}|g" \
              -e 's|%%DATA_FILE%%|regression-runs.json|g' \
              "$TMPL" > gh-pages/regression-history.html

          sed -e 's|%%TITLE%%|Monthly|g' \
              -e 's|%%ICON%%|📊|g' \
              -e 's|%%ACCENT%%|#ffb84f|g' \
              -e "s|%%DATE%%|${REPORT_DATE}|g" \
              -e 's|%%DATA_FILE%%|monthly-runs.json|g' \
              "$TMPL" > gh-pages/monthly-history.html

          sed "s|%%DATE%%|${REPORT_DATE}|g" \
              .github/templates/index.html > gh-pages/index.html

      - name: Deploy to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.DATA_REPO_TOKEN }}
          external_repository: Phillmon8917/phptravels-reports
          publish_branch: gh-pages
          publish_dir: gh-pages/
          keep_files: true
