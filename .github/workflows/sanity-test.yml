              .run-id{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);}
              .badge-status{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.06em;text-transform:uppercase;font-weight:600;}
              .badge-status.passed{background:rgba(79,255,176,.12);color:var(--green);border:1px solid rgba(79,255,176,.25);}
              .badge-status.failed{background:rgba(255,91,91,.12);color:var(--red);border:1px solid rgba(255,91,91,.25);}
              .badge-tag{display:inline-block;padding:2px 8px;border-radius:4px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.06em;text-transform:uppercase;background:var(--surface2);border:1px solid var(--border);color:var(--muted);}
              .badge-trigger{display:inline-block;padding:2px 8px;border-radius:4px;font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.05em;}
              .badge-trigger.schedule{background:rgba(124,158,255,.1);color:#7c9eff;border:1px solid rgba(124,158,255,.2);}
              .badge-trigger.workflow_dispatch{background:rgba(255,184,79,.1);color:#ffb84f;border:1px solid rgba(255,184,79,.2);}
              .badge-trigger.pull_request{background:rgba(79,255,176,.1);color:#4fffb0;border:1px solid rgba(79,255,176,.2);}
              .pass-bar{display:flex;align-items:center;gap:8px;}
              .bar-outer{width:80px;height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
              .bar-inner{height:100%;border-radius:3px;background:var(--accent);}
              .bar-inner.low{background:var(--red);}
              .bar-inner.mid{background:var(--yellow);}
              .actions{display:flex;gap:6px;}
              .action-btn{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .2s;font-size:13px;}
              .action-btn:hover{border-color:var(--accent);color:var(--accent);}
              .action-btn.del:hover{border-color:var(--red);color:var(--red);}
              .pagination{display:flex;align-items:center;justify-content:space-between;margin-top:20px;flex-wrap:wrap;gap:12px;}
              .page-info{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);}
              .page-btns{display:flex;gap:6px;}
              .page-btn{display:inline-flex;align-items:center;justify-content:center;min-width:32px;height:32px;padding:0 8px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;transition:all .2s;}
              .page-btn:hover,.page-btn.active{border-color:var(--accent);color:var(--accent);}
              .page-btn:disabled{opacity:.3;cursor:not-allowed;}
              .empty{text-align:center;padding:60px 20px;color:var(--muted);font-family:'DM Mono',monospace;font-size:12px;letter-spacing:.08em;}
              .bulk-bar{display:flex;align-items:center;gap:12px;padding:10px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;margin-bottom:16px;}
              .bulk-bar span{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);}
              .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center;}
              .modal-overlay.open{display:flex;}
              .modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:32px;max-width:400px;width:100%;}
              .modal h3{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;margin-bottom:12px;}
              .modal p{color:var(--muted);font-size:13px;line-height:1.6;margin-bottom:24px;}
              .modal-actions{display:flex;gap:12px;justify-content:flex-end;}
              .footer{margin-top:40px;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);text-align:center;}
              .footer span{color:var(--accent);}
            </style>
          </head>
          <body>
            <a href="./index.html" class="back">← Back to dashboard</a>
            <div class="header">
              <div class="badge">QA Automation · Java · PHPTRAVELS</div>
              <h1>%%ICON%% <span>%%TITLE%%</span> History</h1>
              <p class="sub">All runs — browse, filter, search and open individual reports. Max 50 stored.</p>
            </div>

            <div class="stats-bar" id="statsBar"></div>

            <div class="toolbar">
              <div class="search-wrap">
                <span class="ico">🔍</span>
                <input type="text" id="searchInput" placeholder="Search by run ID, branch, trigger…"/>
              </div>
              <select id="statusFilter">
                <option value="">All Statuses</option>
                <option value="passed">Passed</option>
                <option value="failed">Failed</option>
              </select>
              <select id="triggerFilter">
                <option value="">All Triggers</option>
                <option value="schedule">Schedule</option>
                <option value="workflow_dispatch">Manual</option>
                <option value="pull_request">Pull Request</option>
              </select>
              <select id="branchFilter">
                <option value="">All Branches</option>
              </select>
              <select id="pageSizeSelect">
                <option value="10">10 / page</option>
                <option value="12" selected>12 / page</option>
                <option value="25">25 / page</option>
                <option value="50">50 / page</option>
              </select>
              <button class="btn danger" id="bulkDeleteBtn" style="display:none" onclick="openBulkDelete()">🗑 Delete Selected</button>
            </div>

            <div id="bulkBar" class="bulk-bar" style="display:none">
              <span id="bulkCount">0 selected</span>
              <button class="btn" onclick="selectAll()">Select All</button>
              <button class="btn" onclick="clearSelection()">Clear</button>
            </div>

            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th><input type="checkbox" class="cb" id="masterCb" onchange="toggleAll(this)"/></th>
                    <th onclick="sortBy('id')">Run ID <span class="sort-icon" data-col="id">↕</span></th>
                    <th onclick="sortBy('date')">Date & Time <span class="sort-icon" data-col="date">↕</span></th>
                    <th onclick="sortBy('branch')">Branch <span class="sort-icon" data-col="branch">↕</span></th>
                    <th onclick="sortBy('tag')">Tag <span class="sort-icon" data-col="tag">↕</span></th>
                    <th onclick="sortBy('trigger')">Trigger <span class="sort-icon" data-col="trigger">↕</span></th>
                    <th onclick="sortBy('status')">Status <span class="sort-icon" data-col="status">↕</span></th>
                    <th onclick="sortBy('tests')">Tests <span class="sort-icon" data-col="tests">↕</span></th>
                    <th onclick="sortBy('passed')">Passed <span class="sort-icon" data-col="passed">↕</span></th>
                    <th onclick="sortBy('failures')">Failed <span class="sort-icon" data-col="failures">↕</span></th>
                    <th onclick="sortBy('passRate')">Pass Rate <span class="sort-icon" data-col="passRate">↕</span></th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="tableBody"></tbody>
              </table>
            </div>

            <div class="pagination">
              <span class="page-info" id="pageInfo"></span>
              <div class="page-btns" id="pageBtns"></div>
            </div>

            <div class="modal-overlay" id="deleteModal">
              <div class="modal">
                <h3>Delete Runs</h3>
                <p id="deleteModalMsg">Are you sure you want to delete the selected runs? This will remove them from the history list. The Allure report files remain on the server.</p>
                <div class="modal-actions">
                  <button class="btn" onclick="closeModal()">Cancel</button>
                  <button class="btn primary danger" style="background:var(--red);border-color:var(--red);" onclick="confirmDelete()">Delete</button>
                </div>
              </div>
            </div>

            <div class="footer">Last updated: %%DATE%% &nbsp;·&nbsp; Branch: <span>java-reports</span></div>

            <script>
              const DATA_FILE = '%%DATA_FILE%%';
              const BASE_PATH = 'https://Phillmon8917.github.io/phptravels-reports/';

              let allRuns = [];
              let filtered = [];
              let selected = new Set();
              let sortCol = 'date';
              let sortDir = -1;
              let page = 1;
              let pageSize = 12;

              async function loadData() {
                try {
                  const r = await fetch(BASE_PATH + DATA_FILE + '?t=' + Date.now());
                  allRuns = await r.json();
                } catch(e) {
                  allRuns = [];
                }
                populateBranchFilter();
                applyFilters();
              }

              function populateBranchFilter() {
                const sel = document.getElementById('branchFilter');
                const branches = [...new Set(allRuns.map(r => r.branch))].filter(Boolean);
                branches.forEach(b => {
                  const opt = document.createElement('option');
                  opt.value = b; opt.textContent = b;
                  sel.appendChild(opt);
                });
              }

              function applyFilters() {
                const q = document.getElementById('searchInput').value.toLowerCase();
                const status = document.getElementById('statusFilter').value;
                const trigger = document.getElementById('triggerFilter').value;
                const branch = document.getElementById('branchFilter').value;
                filtered = allRuns.filter(r => {
                  const matchQ = !q || r.id.toLowerCase().includes(q) || (r.branch||'').toLowerCase().includes(q) || (r.trigger||'').toLowerCase().includes(q) || (r.tag||'').toLowerCase().includes(q);
                  const matchS = !status || r.status === status;
                  const matchT = !trigger || r.trigger === trigger;
                  const matchB = !branch || r.branch === branch;
                  return matchQ && matchS && matchT && matchB;
                });
                sortData();
                page = 1;
                render();
              }

              function sortData() {
                filtered.sort((a, b) => {
                  let av = a[sortCol], bv = b[sortCol];
                  if (sortCol === 'passRate') { av = parseFloat(av)||0; bv = parseFloat(bv)||0; }
                  if (typeof av === 'number') return (av - bv) * sortDir;
                  return String(av||'').localeCompare(String(bv||'')) * sortDir;
                });
              }

              function sortBy(col) {
                if (sortCol === col) sortDir *= -1;
                else { sortCol = col; sortDir = -1; }
                document.querySelectorAll('thead th').forEach(th => th.classList.remove('sorted'));
                document.querySelectorAll('.sort-icon').forEach(ic => {
                  ic.textContent = '↕'; ic.style.opacity = '.4';
                });
                const th = document.querySelector(`[data-col="${col}"]`);
                if (th) {
                  th.parentElement.classList.add('sorted');
                  th.textContent = sortDir === -1 ? '↓' : '↑';
                  th.style.opacity = '1';
                }
                sortData();
                render();
              }

              function render() {
                renderStats();
                const start = (page - 1) * pageSize;
                const pageItems = filtered.slice(start, start + pageSize);
                const tbody = document.getElementById('tableBody');
                if (filtered.length === 0) {
                  tbody.innerHTML = '<tr><td colspan="12" class="empty">NO RUNS FOUND · Try adjusting your filters</td></tr>';
                  document.getElementById('pageInfo').textContent = '';
                  document.getElementById('pageBtns').innerHTML = '';
                  return;
                }
                tbody.innerHTML = pageItems.map(r => {
                  const rate = parseFloat(r.passRate) || 0;
                  const barClass = rate >= 80 ? '' : rate >= 50 ? 'mid' : 'low';
                  const isSelected = selected.has(r.id);
                  const dateStr = r.date ? new Date(r.date).toLocaleString('en-ZA', {dateStyle:'medium',timeStyle:'short'}) : '—';
                  return `<tr>
                    <td><input type="checkbox" class="cb" data-id="${r.id}" ${isSelected?'checked':''} onchange="toggleRow('${r.id}',this)"/></td>
                    <td><span class="run-id">${r.id}</span></td>
                    <td style="white-space:nowrap">${dateStr}</td>
                    <td><code style="font-size:12px;color:var(--accent)">${r.branch||'—'}</code></td>
                    <td><span class="badge-tag">${r.tag||'—'}</span></td>
                    <td><span class="badge-trigger ${r.trigger||''}">${triggerLabel(r.trigger)}</span></td>
                    <td><span class="badge-status ${r.status||''}">${r.status==='passed'?'✅ Passed':'❌ Failed'}</span></td>
                    <td style="font-family:'DM Mono',monospace">${r.tests||0}</td>
                    <td style="font-family:'DM Mono',monospace;color:var(--green)">${r.passed||0}</td>
                    <td style="font-family:'DM Mono',monospace;color:${(r.failures||0)>0?'var(--red)':'var(--muted)'}">${r.failures||0}</td>
                    <td><div class="pass-bar"><div class="bar-outer"><div class="bar-inner ${barClass}" style="width:${Math.min(rate,100)}%"></div></div><span style="font-family:'DM Mono',monospace;font-size:11px">${rate}%</span></div></td>
                    <td><div class="actions">
                      <a href="${BASE_PATH}${r.reportPath}" target="_blank" title="Open report" class="action-btn">📋</a>
                      <button onclick="deleteOne('${r.id}')" title="Delete" class="action-btn del">🗑</button>
                    </div></td>
                  </tr>`;
                }).join('');

                const total = filtered.length;
                const totalPages = Math.ceil(total / pageSize);
                document.getElementById('pageInfo').textContent = `Showing ${start+1}–${Math.min(start+pageSize,total)} of ${total} runs`;
                renderPagination(totalPages);
                updateBulkUI();
              }

              function triggerLabel(t) {
                if (t === 'schedule') return '🕐 Schedule';
                if (t === 'workflow_dispatch') return '▶ Manual';
                if (t === 'pull_request') return '🔀 PR';
                return t || '—';
              }

              function renderStats() {
                const total = filtered.length;
                const passed = filtered.filter(r => r.status === 'passed').length;
                const failed = filtered.filter(r => r.status === 'failed').length;
                const avgRate = total ? (filtered.reduce((s,r)=>s+(parseFloat(r.passRate)||0),0)/total).toFixed(1) : '0.0';
                document.getElementById('statsBar').innerHTML = `
                  <div class="stat"><div class="stat-label">Total Runs</div><div class="stat-value">${total}</div></div>
                  <div class="stat"><div class="stat-label">Passed</div><div class="stat-value green">${passed}</div></div>
                  <div class="stat"><div class="stat-label">Failed</div><div class="stat-value red">${failed}</div></div>
                  <div class="stat"><div class="stat-label">Avg Pass Rate</div><div class="stat-value ${parseFloat(avgRate)>=80?'green':parseFloat(avgRate)>=50?'yellow':'red'}">${avgRate}%</div></div>
                `;
              }

              function renderPagination(totalPages) {
                const btns = document.getElementById('pageBtns');
                btns.innerHTML = '';
                const addBtn = (label, p, disabled, active) => {
                  const b = document.createElement('button');
                  b.className = 'page-btn' + (active?' active':'');
                  b.textContent = label;
                  b.disabled = disabled;
                  b.onclick = () => { page = p; render(); };
                  btns.appendChild(b);
                };
                addBtn('«', 1, page===1, false);
                addBtn('‹', page-1, page===1, false);
                const start = Math.max(1, page-2);
                const end = Math.min(totalPages, page+2);
                for(let i=start;i<=end;i++) addBtn(i, i, false, i===page);
                addBtn('›', page+1, page===totalPages, false);
                addBtn('»', totalPages, page===totalPages, false);
              }

              function toggleRow(id, cb) {
                if (cb.checked) selected.add(id); else selected.delete(id);
                updateBulkUI();
              }

              function toggleAll(masterCb) {
                const cbs = document.querySelectorAll('tbody .cb');
                cbs.forEach(cb => {
                  cb.checked = masterCb.checked;
                  const id = cb.dataset.id;
                  if (masterCb.checked) selected.add(id); else selected.delete(id);
                });
                updateBulkUI();
              }

              function selectAll() {
                filtered.forEach(r => selected.add(r.id));
                render();
              }

              function clearSelection() {
                selected.clear();
                document.getElementById('masterCb').checked = false;
                render();
              }

              function updateBulkUI() {
                const n = selected.size;
                document.getElementById('bulkDeleteBtn').style.display = n > 0 ? '' : 'none';
                document.getElementById('bulkBar').style.display = n > 0 ? 'flex' : 'none';
                document.getElementById('bulkCount').textContent = n + ' selected';
              }

              let pendingDelete = null;

              function openBulkDelete() {
                pendingDelete = [...selected];
                document.getElementById('deleteModalMsg').textContent = `Delete ${pendingDelete.length} selected run(s) from the history list?`;
                document.getElementById('deleteModal').classList.add('open');
              }

              function deleteOne(id) {
                pendingDelete = [id];
                document.getElementById('deleteModalMsg').textContent = `Delete run ${id} from the history list?`;
                document.getElementById('deleteModal').classList.add('open');
              }

              function closeModal() {
                document.getElementById('deleteModal').classList.remove('open');
                pendingDelete = null;
              }

              function confirmDelete() {
                if (!pendingDelete) return;
                allRuns = allRuns.filter(r => !pendingDelete.includes(r.id));
                pendingDelete.forEach(id => selected.delete(id));
                closeModal();
                applyFilters();
                alert('Runs removed from local view.\n\nTo permanently remove from the server, commit the updated JSON file to the repository.');
              }

              ['searchInput','statusFilter','triggerFilter','branchFilter'].forEach(id => {
                document.getElementById(id).addEventListener('input', applyFilters);
                document.getElementById(id).addEventListener('change', applyFilters);
              });
              document.getElementById('pageSizeSelect').addEventListener('change', function() {
                pageSize = parseInt(this.value);
                page = 1;
                render();
              });

              loadData();
            </script>
          </body>
          </html>
          TMPL
          )

          echo "$HISTORY_TEMPLATE" | \
            sed 's|%%TITLE%%|Sanity|g' | \
            sed 's|%%ICON%%|⚡|g' | \
            sed 's|%%ACCENT%%|#7c9eff|g' | \
            sed "s|%%DATE%%|${{ env.REPORT_DATE }}|g" | \
            sed 's|%%DATA_FILE%%|sanity-runs.json|g' \
            > gh-pages/sanity-history.html

          if [ ! -f gh-pages/regression-history.html ]; then
            echo "$HISTORY_TEMPLATE" | \
              sed 's|%%TITLE%%|Regression|g' | \
              sed 's|%%ICON%%|🧪|g' | \
              sed 's|%%ACCENT%%|#4fffb0|g' | \
              sed "s|%%DATE%%|${{ env.REPORT_DATE }}|g" | \
              sed 's|%%DATA_FILE%%|regression-runs.json|g' \
              > gh-pages/regression-history.html
          fi

          if [ ! -f gh-pages/monthly-history.html ]; then
            echo "$HISTORY_TEMPLATE" | \
              sed 's|%%TITLE%%|Monthly|g' | \
              sed 's|%%ICON%%|📊|g' | \
              sed 's|%%ACCENT%%|#ffb84f|g' | \
              sed "s|%%DATE%%|${{ env.REPORT_DATE }}|g" | \
              sed 's|%%DATA_FILE%%|monthly-runs.json|g' \
              > gh-pages/monthly-history.html
          fi

          if [ ! -f gh-pages/regression-runs.json ]; then
            echo "[]" > gh-pages/regression-runs.json
          fi

          if [ ! -f gh-pages/monthly-runs.json ]; then
            echo "[]" > gh-pages/monthly-runs.json
          fi

      - name: Deploy to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.DATA_REPO_TOKEN }}
          external_repository: Phillmon8917/phptravels-reports
          publish_branch: gh-pages
          publish_dir: gh-pages/
          keep_files: true

      - name: Upload Allure report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-sanity
          path: target/site/allure-maven-plugin/
          retention-days: 7
