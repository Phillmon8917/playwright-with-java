name: Sanity Tests

permissions:
  contents: write
  actions: write
  pages: write
  id-token: write

on:
  schedule:
    - cron: "30 6 * * *"
    - cron: "0 10 * * *"
  pull_request:
    branches:
      - develop
      - qa
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: "Test tag to run"
        required: false
        default: "sanity"
        type: choice
        options:
          - sanity
          - guest
          - authentication
          - customer
          - agent
          - admin
          - regression
      branch:
        description: "Branch to run on"
        required: false
        default: "qa"
        type: choice
        options:
          - qa
          - develop
          - main
      base_url:
        description: "Base URL"
        required: false
        default: ""
      action_timeout:
        description: "Action timeout (ms)"
        required: false
        default: ""
      navigation_timeout:
        description: "Navigation timeout (ms)"
        required: false
        default: ""
      test_timeout:
        description: "Test timeout (ms)"
        required: false
        default: ""

jobs:
  resolve-branch:
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.set.outputs.branch }}
    steps:
      - name: Resolve target branch
        id: set
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "branch=qa" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "branch=${{ github.head_ref }}" >> $GITHUB_OUTPUT
          else
            echo "branch=${{ inputs.branch != '' && inputs.branch || 'qa' }}" >> $GITHUB_OUTPUT
          fi

  sanity:
    needs: resolve-branch
    runs-on: ubuntu-latest
    env:
      CI: true
      ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      CUSTOMER_USERNAME: ${{ secrets.CUSTOMER_USERNAME }}
      CUSTOMER_PASSWORD: ${{ secrets.CUSTOMER_PASSWORD }}
      AGENT_USERNAME: ${{ secrets.AGENT_USERNAME }}
      AGENT_PASSWORD: ${{ secrets.AGENT_PASSWORD }}
      BASE_URL: ${{ inputs.base_url != '' && inputs.base_url || vars.BASE_URL }}
      ACTION_TIMEOUT: ${{ inputs.action_timeout != '' && inputs.action_timeout ||
        vars.ACTION_TIMEOUT }}
      NAVIGATION_TIMEOUT: ${{ inputs.navigation_timeout != '' &&
        inputs.navigation_timeout || vars.NAVIGATION_TIMEOUT }}
      TEST_TIMEOUT: ${{ inputs.test_timeout != '' && inputs.test_timeout ||
        vars.TEST_TIMEOUT }}
      DATA_REPO_TOKEN: ${{ secrets.DATA_REPO_TOKEN }}
      DATA_REPO_OWNER: Phillmon8917
      DATA_REPO_NAME: phptravels-reports
      DATA_REPO_BRANCH: java-reports

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-branch.outputs.branch }}

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Install Playwright browsers
        run: mvn exec:java -e -Dexec.mainClass=com.microsoft.playwright.CLI
          -Dexec.args="install --with-deps"

      - name: Run authentication first
        run: mvn test -Dsurefire.failIfNoSpecifiedTests=false -Dgroups="authentication"

      - name: Run sanity tests
        id: run_tests
        run: |
          mvn test -Dsurefire.failIfNoSpecifiedTests=false \
            -Dgroups="${{ inputs.tag != '' && inputs.tag || 'sanity' }}" \
            | tee test-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Parse test results
        if: always()
        id: parse
        run: |
          TESTS=$(grep -oP 'Tests run: \K[0-9]+' test-output.txt | tail -1 || echo "0")
          FAILURES=$(grep -oP 'Failures: \K[0-9]+' test-output.txt | tail -1 || echo "0")
          ERRORS=$(grep -oP 'Errors: \K[0-9]+' test-output.txt | tail -1 || echo "0")
          SKIPPED=$(grep -oP 'Skipped: \K[0-9]+' test-output.txt | tail -1 || echo "0")
          PASSED=$((TESTS - FAILURES - ERRORS - SKIPPED))
          echo "tests=$TESTS" >> $GITHUB_OUTPUT
          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failures=$FAILURES" >> $GITHUB_OUTPUT
          echo "errors=$ERRORS" >> $GITHUB_OUTPUT
          echo "skipped=$SKIPPED" >> $GITHUB_OUTPUT

      - name: Write run summary
        if: always()
        run: |
          BRANCH="${{ needs.resolve-branch.outputs.branch }}"
          TAG="${{ inputs.tag != '' && inputs.tag || 'sanity' }}"
          RUN_DATE=$(date -u '+%Y-%m-%d %H:%M UTC')
          TRIGGER="${{ github.event_name }}"
          TESTS=${{ steps.parse.outputs.tests }}
          PASSED=${{ steps.parse.outputs.passed }}
          FAILURES=${{ steps.parse.outputs.failures }}
          ERRORS=${{ steps.parse.outputs.errors }}
          SKIPPED=${{ steps.parse.outputs.skipped }}

          if [ "$FAILURES" -eq 0 ] && [ "$ERRORS" -eq 0 ]; then
            OVERALL="✅ All Passed"
          else
            OVERALL="❌ Some Failed"
          fi

          PASS_RATE=0
          if [ "$TESTS" -gt 0 ]; then
            PASS_RATE=$(echo "scale=1; $PASSED * 100 / $TESTS" | bc)
          fi

          PR_LINK=""
          if [ "$TRIGGER" = "pull_request" ]; then
            PR_LINK="| 🔀 Pull Request | [#${{ github.event.pull_request.number }}](${{ github.event.pull_request.html_url }}) |"
          fi

          cat >> $GITHUB_STEP_SUMMARY << EOF
          # ⚡ Sanity Run Summary

          | Field | Value |
          |-------|-------|
          | 📅 Date | $RUN_DATE |
          | 🌿 Branch | \`$BRANCH\` |
          | 🏷️ Test Type | \`$TAG\` |
          | 🔀 Trigger | \`$TRIGGER\` |
          | 🌐 Base URL | ${{ env.BASE_URL }} |
          | 📊 Overall Status | $OVERALL |
          $PR_LINK

          ## 📈 Results

          | Metric | Count |
          |--------|-------|
          | Total Tests | $TESTS |
          | ✅ Passed | $PASSED |
          | ❌ Failed | $FAILURES |
          | 🔴 Errors | $ERRORS |
          | ⏭️ Skipped | $SKIPPED |
          | 📊 Pass Rate | $PASS_RATE% |

          ## 🔗 Reports
          | Report | Link |
          |--------|------|
          | Sanity Report | [View](https://Phillmon8917.github.io/phptravels-reports/sanity-report/index.html) |
          EOF

      - name: Generate Allure report
        if: always()
        run: mvn allure:report

      - name: Set run metadata
        if: always()
        run: |
          RUN_ID="${{ github.run_id }}"
          RUN_DATE=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
          BRANCH="${{ needs.resolve-branch.outputs.branch }}"
          TAG="${{ inputs.tag != '' && inputs.tag || 'sanity' }}"
          TRIGGER="${{ github.event_name }}"
          TESTS=${{ steps.parse.outputs.tests }}
          PASSED=${{ steps.parse.outputs.passed }}
          FAILURES=${{ steps.parse.outputs.failures }}
          ERRORS=${{ steps.parse.outputs.errors }}
          SKIPPED=${{ steps.parse.outputs.skipped }}
          if [ "$FAILURES" -eq 0 ] && [ "$ERRORS" -eq 0 ]; then
            STATUS="passed"
          else
            STATUS="failed"
          fi
          PASS_RATE=0
          if [ "$TESTS" -gt 0 ]; then
            PASS_RATE=$(echo "scale=1; $PASSED * 100 / $TESTS" | bc)
          fi
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "RUN_DATE=$RUN_DATE" >> $GITHUB_ENV
          echo "REPORT_DATE=$(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_ENV
          echo "META_BRANCH=$BRANCH" >> $GITHUB_ENV
          echo "META_TAG=$TAG" >> $GITHUB_ENV
          echo "META_TRIGGER=$TRIGGER" >> $GITHUB_ENV
          echo "META_TESTS=$TESTS" >> $GITHUB_ENV
          echo "META_PASSED=$PASSED" >> $GITHUB_ENV
          echo "META_FAILURES=$FAILURES" >> $GITHUB_ENV
          echo "META_ERRORS=$ERRORS" >> $GITHUB_ENV
          echo "META_SKIPPED=$SKIPPED" >> $GITHUB_ENV
          echo "META_STATUS=$STATUS" >> $GITHUB_ENV
          echo "META_PASS_RATE=$PASS_RATE" >> $GITHUB_ENV

      - name: Checkout gh-pages from phptravels-reports
        if: always()
        uses: actions/checkout@v4
        with:
          repository: Phillmon8917/phptravels-reports
          ref: gh-pages
          path: gh-pages
          token: ${{ secrets.DATA_REPO_TOKEN }}
        continue-on-error: true

      - name: Assemble Pages directory
        if: always()
        run: |
          RUN_ID="${{ env.RUN_ID }}"
          RUN_DIR="gh-pages/sanity-reports/${RUN_ID}"
          mkdir -p "$RUN_DIR"

          cp -r target/site/allure-maven-plugin/. "$RUN_DIR/"

          RUNS_JSON="gh-pages/sanity-runs.json"
          if [ ! -f "$RUNS_JSON" ]; then
            echo "[]" > "$RUNS_JSON"
          fi

          NEW_ENTRY=$(cat << JSONEOF
          {
            "id": "$RUN_ID",
            "date": "${{ env.RUN_DATE }}",
            "branch": "${{ env.META_BRANCH }}",
            "tag": "${{ env.META_TAG }}",
            "trigger": "${{ env.META_TRIGGER }}",
            "status": "${{ env.META_STATUS }}",
            "tests": ${{ env.META_TESTS }},
            "passed": ${{ env.META_PASSED }},
            "failures": ${{ env.META_FAILURES }},
            "errors": ${{ env.META_ERRORS }},
            "skipped": ${{ env.META_SKIPPED }},
            "passRate": "${{ env.META_PASS_RATE }}",
            "reportPath": "sanity-reports/${RUN_ID}/index.html"
          }
          JSONEOF
          )

          python3 - << 'PYEOF'
          import json, os, sys

          runs_path = "gh-pages/sanity-runs.json"
          new_entry_path = "/dev/stdin"

          with open(runs_path) as f:
              runs = json.load(f)

          new_entry = json.loads(os.environ.get("NEW_ENTRY_JSON", "{}"))
          runs.insert(0, new_entry)

          if len(runs) > 50:
              removed = runs[50:]
              runs = runs[:50]
              for r in removed:
                  old_dir = f"gh-pages/{r['reportPath'].replace('/index.html','')}"
                  if os.path.isdir(old_dir):
                      import shutil
                      shutil.rmtree(old_dir)

          with open(runs_path, "w") as f:
              json.dump(runs, f, indent=2)
          PYEOF

          python3 -c "
          import json, os, shutil

          runs_path = 'gh-pages/sanity-runs.json'
          run_id = '$RUN_ID'
          new_entry = {
            'id': run_id,
            'date': '${{ env.RUN_DATE }}',
            'branch': '${{ env.META_BRANCH }}',
            'tag': '${{ env.META_TAG }}',
            'trigger': '${{ env.META_TRIGGER }}',
            'status': '${{ env.META_STATUS }}',
            'tests': ${{ env.META_TESTS }},
            'passed': ${{ env.META_PASSED }},
            'failures': ${{ env.META_FAILURES }},
            'errors': ${{ env.META_ERRORS }},
            'skipped': ${{ env.META_SKIPPED }},
            'passRate': '${{ env.META_PASS_RATE }}',
            'reportPath': f'sanity-reports/{run_id}/index.html'
          }

          with open(runs_path) as f:
              runs = json.load(f)

          runs.insert(0, new_entry)

          if len(runs) > 50:
              removed = runs[50:]
              runs = runs[:50]
              for r in removed:
                  old_dir = 'gh-pages/' + r['reportPath'].replace('/index.html','')
                  if os.path.isdir(old_dir):
                      shutil.rmtree(old_dir)

          with open(runs_path, 'w') as f:
              json.dump(runs, f, indent=2)
          "

          mkdir -p gh-pages/sanity-report
          cp -r target/site/allure-maven-plugin/. gh-pages/sanity-report/

          if [ ! -f gh-pages/index.html ]; then
            cp /dev/null gh-pages/index.html
          fi

          cat > gh-pages/index.html << 'HTML'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <title>Java QA Dashboard</title>
            <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
            <style>
              :root { --bg:#0b0d12; --surface:#111318; --border:#1f2330; --accent:#4fffb0; --accent2:#7c9eff; --accent3:#ffb84f; --text:#e8eaf0; --muted:#6b7080; }
              * { box-sizing:border-box; margin:0; padding:0; }
              body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif;
                     min-height:100vh; display:flex; flex-direction:column;
                     align-items:center; justify-content:center; padding:48px 24px; }
              .badge { font-family:'DM Mono',monospace; font-size:11px; letter-spacing:.2em;
                       text-transform:uppercase; color:var(--accent);
                       background:rgba(79,255,176,.08); border:1px solid rgba(79,255,176,.2);
                       padding:4px 14px; border-radius:2px; margin-bottom:24px; }
              h1 { font-family:'Syne',sans-serif; font-size:clamp(32px,6vw,56px);
                   font-weight:800; letter-spacing:-.03em; text-align:center; margin-bottom:12px; }
              h1 span { color:var(--accent); }
              .sub { color:var(--muted); font-size:15px; text-align:center; margin-bottom:56px; }
              .section-label { font-family:'DM Mono',monospace; font-size:11px; letter-spacing:.15em;
                               text-transform:uppercase; color:var(--muted); margin-bottom:20px;
                               text-align:center; }
              .cards { display:flex; gap:24px; flex-wrap:wrap; justify-content:center; margin-bottom:48px; }
              .card { background:var(--surface); border:1px solid var(--border); border-radius:12px;
                      padding:32px 28px; text-decoration:none; color:inherit; width:300px;
                      transition:transform .2s,border-color .2s; position:relative; overflow:hidden; }
              .card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; }
              .card.green::before  { background:var(--accent); }
              .card.blue::before   { background:var(--accent2); }
              .card.orange::before { background:var(--accent3); }
              .card:hover { transform:translateY(-4px); border-color:#3a3f50; }
              .card-icon { font-size:32px; margin-bottom:16px; }
              .card-title { font-family:'Syne',sans-serif; font-size:20px; font-weight:700; margin-bottom:8px; }
              .card-desc { font-size:13px; color:var(--muted); line-height:1.6; margin-bottom:24px; }
              .card-link { font-family:'DM Mono',monospace; font-size:11px; letter-spacing:.1em; text-transform:uppercase; }
              .card.green  .card-link { color:var(--accent); }
              .card.blue   .card-link { color:var(--accent2); }
              .card.orange .card-link { color:var(--accent3); }
              .footer { margin-top:8px; font-family:'DM Mono',monospace; font-size:11px;
                        color:var(--muted); text-align:center; line-height:1.8; }
              .footer span { color:var(--accent); }
            </style>
          </head>
          <body>
            <div class="badge">QA Automation · Java · PHPTRAVELS</div>
            <h1>Java Test <span>Dashboard</span></h1>
            <p class="sub">Sanity, regression and monthly QA reports for the Java Playwright suite.</p>
            <div class="section-label">Reports</div>
            <div class="cards">
              <a href="./sanity-history.html" class="card blue">
                <div class="card-icon">⚡</div>
                <div class="card-title">Sanity Reports</div>
                <div class="card-desc">All sanity runs — browse, filter, search and open any individual run report.</div>
                <div class="card-link">View history →</div>
              </a>
              <a href="./regression-history.html" class="card green">
                <div class="card-icon">🧪</div>
                <div class="card-title">Regression Reports</div>
                <div class="card-desc">All regression runs with full Allure details, logs, screenshots and step-level results.</div>
                <div class="card-link">View history →</div>
              </a>
              <a href="./monthly-history.html" class="card orange">
                <div class="card-icon">📊</div>
                <div class="card-title">Monthly QA Reports</div>
                <div class="card-desc">Monthly trend and pass-rate reports aggregated across every run.</div>
                <div class="card-link">View history →</div>
              </a>
            </div>
            <div class="footer">
              Last updated: ${{ env.REPORT_DATE }} &nbsp;·&nbsp; Branch: <span>java-reports</span>
            </div>
          </body>
          </html>
          HTML

          HISTORY_TEMPLATE=$(cat << 'TMPL'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8"/>
            <title>%%TITLE%% — QA Dashboard</title>
            <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
            <style>
              :root{--bg:#0b0d12;--surface:#111318;--surface2:#161b25;--border:#1f2330;--accent:%%ACCENT%%;--text:#e8eaf0;--muted:#6b7080;--red:#ff5b5b;--green:#4fffb0;--yellow:#ffb84f;}
              *{box-sizing:border-box;margin:0;padding:0;}
