name: Sanity Tests

permissions:
  contents: write
  actions: write
  pages: write
  id-token: write

on:
  pull_request:
    branches:
      - develop
      - qa
      - main
  schedule:
    - cron: "0 8 * * *" # 08:00 UTC -> develop
    - cron: "0 13 * * *" # 13:00 UTC -> qa
  workflow_dispatch:
    inputs:
      tag:
        description: "Test tag to run"
        required: false
        default: "sanity"
        type: choice
        options:
          - sanity
          - guest
          - authentication
          - customer
          - agent
          - admin
          - regression
      base_url:
        description: "Base URL"
        required: false
        default: ""
      action_timeout:
        description: "Action timeout (ms)"
        required: false
        default: ""
      navigation_timeout:
        description: "Navigation timeout (ms)"
        required: false
        default: ""
      test_timeout:
        description: "Test timeout (ms)"
        required: false
        default: ""

env:
  # Opt in to Node.js 24 to avoid deprecation warnings from actions using Node 20
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Resolves which branch to run sanity on.
  # - Scheduled 08:00 UTC -> develop
  # - Scheduled 13:00 UTC -> qa
  # - PR              -> uses github.head_ref (the PR source branch, not the merge ref)
  # - Manual          -> uses github.ref_name
  resolve-branch:
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.set.outputs.branch }}
    steps:
      - name: Resolve target branch
        id: set
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            HOUR=$(date -u +%H)
            if [ "$HOUR" = "08" ]; then
              echo "branch=develop" >> $GITHUB_OUTPUT
            else
              echo "branch=qa" >> $GITHUB_OUTPUT
            fi
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            # github.ref_name on a PR event returns the merge ref (e.g. "11/merge"),
            # which cannot be fetched directly. Use github.head_ref instead.
            echo "branch=${{ github.head_ref }}" >> $GITHUB_OUTPUT
          else
            echo "branch=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

  sanity:
    needs: resolve-branch
    runs-on: ubuntu-latest
    env:
      CI: true
      ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      CUSTOMER_USERNAME: ${{ secrets.CUSTOMER_USERNAME }}
      CUSTOMER_PASSWORD: ${{ secrets.CUSTOMER_PASSWORD }}
      AGENT_USERNAME: ${{ secrets.AGENT_USERNAME }}
      AGENT_PASSWORD: ${{ secrets.AGENT_PASSWORD }}
      BASE_URL: ${{ inputs.base_url != '' && inputs.base_url || vars.BASE_URL }}
      ACTION_TIMEOUT: ${{ inputs.action_timeout != '' && inputs.action_timeout ||
        vars.ACTION_TIMEOUT }}
      NAVIGATION_TIMEOUT: ${{ inputs.navigation_timeout != '' &&
        inputs.navigation_timeout || vars.NAVIGATION_TIMEOUT }}
      TEST_TIMEOUT: ${{ inputs.test_timeout != '' && inputs.test_timeout ||
        vars.TEST_TIMEOUT }}
      DATA_REPO_TOKEN: ${{ secrets.DATA_REPO_TOKEN }}
      DATA_REPO_OWNER: Phillmon8917
      DATA_REPO_NAME: phptravels-reports
      DATA_REPO_BRANCH: java-reports

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-branch.outputs.branch }}

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Install Playwright browsers
        run: mvn exec:java -e -Dexec.mainClass=com.microsoft.playwright.CLI
          -Dexec.args="install --with-deps"

      - name: Run authentication first
        run: mvn test -Dsurefire.failIfNoSpecifiedTests=false -Dgroups="authentication"

      - name: Run sanity tests
        run: mvn test -Dsurefire.failIfNoSpecifiedTests=false -Dgroups="${{ inputs.tag
          != '' && inputs.tag || 'sanity' }}"

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-sanity
          path: target/allure-results/
          retention-days: 7

  build-report:
    needs: [ resolve-branch, sanity ]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-branch.outputs.branch }}
          fetch-depth: 1

      - name: Verify pom.xml exists
        run: |
          if [ ! -f "$GITHUB_WORKSPACE/pom.xml" ]; then
            echo "ERROR: pom.xml not found in $GITHUB_WORKSPACE"
            ls -la "$GITHUB_WORKSPACE"
            exit 1
          fi
          echo "pom.xml found at $GITHUB_WORKSPACE/pom.xml"

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-sanity
          path: target/allure-results/

      - name: Generate Allure report
        # Always use -f to point Maven at the correct pom.xml regardless of working directory
        run: mvn -f "$GITHUB_WORKSPACE/pom.xml"
          io.qameta.allure:allure-maven:2.12.0:report

      - name: Set report date
        run: echo "REPORT_DATE=$(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_ENV

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      - name: Assemble Pages directory
        run: |
          mkdir -p gh-pages/sanity-report

          if [ -d "$GITHUB_WORKSPACE/target/site/allure-maven-plugin" ]; then
            cp -r "$GITHUB_WORKSPACE/target/site/allure-maven-plugin/." gh-pages/sanity-report/
          else
            echo "<html><body><h2>Sanity Allure report not available for this run.</h2></body></html>" \
              > gh-pages/sanity-report/index.html
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: gh-pages/
          keep_files: true

      - name: Upload Allure report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-sanity
          path: target/site/allure-maven-plugin/
          retention-days: 7
