              .back:hover{color:var(--accent);}
              .header{margin-bottom:32px;}
              .badge{display:inline-block;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);background:rgba(79,255,176,.08);border:1px solid rgba(79,255,176,.2);padding:4px 14px;border-radius:2px;margin-bottom:16px;}
              h1{font-family:'Syne',sans-serif;font-size:clamp(24px,4vw,40px);font-weight:800;letter-spacing:-.03em;margin-bottom:6px;}
              h1 span{color:var(--accent);}
              .sub{color:var(--muted);font-size:14px;}
              .toolbar{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:24px;align-items:center;}
              .search-wrap{position:relative;flex:1;min-width:220px;}
              .search-wrap input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px 10px 36px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border-color .2s;}
              .search-wrap input:focus{border-color:var(--accent);}
              .search-wrap .ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;}
              select{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.06em;outline:none;cursor:pointer;transition:border-color .2s;}
              select:focus{border-color:var(--accent);}
              .btn{display:inline-flex;align-items:center;gap:6px;padding:10px 16px;border-radius:8px;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--muted);transition:all .2s;}
              .btn:hover{border-color:var(--accent);color:var(--accent);}
              .btn.danger:hover{border-color:var(--red);color:var(--red);}
              .btn.primary{background:var(--accent);color:#0b0d12;border-color:var(--accent);font-weight:700;}
              .btn.primary:hover{opacity:.85;}
              .stats-bar{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:24px;}
              .stat{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 20px;flex:1;min-width:100px;}
              .stat-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
              .stat-value{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;}
              .stat-value.green{color:var(--green);}
              .stat-value.red{color:var(--red);}
              .stat-value.yellow{color:var(--yellow);}
              .table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:12px;}
              table{width:100%;border-collapse:collapse;font-size:13px;}
              thead th{background:var(--surface2);padding:12px 16px;text-align:left;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none;}
