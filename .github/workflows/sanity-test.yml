name: Sanity Tests

permissions:
  contents: write
  actions: write
  pages: write
  id-token: write

on:
  schedule:
    - cron: "30 6 * * *"
    - cron: "0 10 * * *"
  pull_request:
    branches:
      - develop
      - qa
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: "Test tag to run"
        required: false
        default: "sanity"
        type: choice
        options:
          - sanity
          - guest
          - authentication
          - customer
          - agent
          - admin
          - regression
      branch:
        description: "Branch to run on"
        required: false
        default: "qa"
        type: choice
        options:
          - qa
          - develop
          - main
      base_url:
        description: "Base URL"
        required: false
        default: "https://phptravels.net/"
      action_timeout:
        description: "Action timeout (ms)"
        required: false
        default: "80000"
      navigation_timeout:
        description: "Navigation timeout (ms)"
        required: false
        default: "120000"
      test_timeout:
        description: "Test timeout (ms)"
        required: false
        default: "360000"

jobs:
  resolve-branch:
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.set.outputs.branch }}
    steps:
      - name: Resolve target branch
        id: set
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "branch=qa" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "branch=${{ github.head_ref }}" >> $GITHUB_OUTPUT
          else
            echo "branch=${{ inputs.branch != '' && inputs.branch || 'qa' }}" >> $GITHUB_OUTPUT
          fi

  sanity:
    needs: resolve-branch
    runs-on: ubuntu-latest
    env:
      CI: true
      ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      CUSTOMER_USERNAME: ${{ secrets.CUSTOMER_USERNAME }}
      CUSTOMER_PASSWORD: ${{ secrets.CUSTOMER_PASSWORD }}
      AGENT_USERNAME: ${{ secrets.AGENT_USERNAME }}
      AGENT_PASSWORD: ${{ secrets.AGENT_PASSWORD }}
      BASE_URL: ${{ inputs.base_url != '' && inputs.base_url || vars.BASE_URL }}
      ACTION_TIMEOUT: ${{ inputs.action_timeout != '' && inputs.action_timeout ||
        vars.ACTION_TIMEOUT }}
      NAVIGATION_TIMEOUT: ${{ inputs.navigation_timeout != '' &&
        inputs.navigation_timeout || vars.NAVIGATION_TIMEOUT }}
      TEST_TIMEOUT: ${{ inputs.test_timeout != '' && inputs.test_timeout ||
        vars.TEST_TIMEOUT }}
      DATA_REPO_TOKEN: ${{ secrets.DATA_REPO_TOKEN }}
      DATA_REPO_OWNER: Phillmon8917
      DATA_REPO_NAME: phptravels-reports
      DATA_REPO_BRANCH: java-reports

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-branch.outputs.branch }}

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Install Playwright browsers
        run: mvn exec:java -e -Dexec.mainClass=com.microsoft.playwright.CLI
          -Dexec.args="install --with-deps"

      - name: Run authentication first
        run: mvn test -Dsurefire.failIfNoSpecifiedTests=false -Dgroups="authentication"

      - name: Run sanity tests
        id: run_tests
        run: |
          mvn test -Dsurefire.failIfNoSpecifiedTests=false \
            -Dgroups="${{ inputs.tag != '' && inputs.tag || 'sanity' }}" \
            | tee test-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Parse test results
        if: always()
        id: parse
        run: |
          TESTS=$(grep -oP 'Tests run: \K[0-9]+' test-output.txt | tail -1 || echo "0")
          FAILURES=$(grep -oP 'Failures: \K[0-9]+' test-output.txt | tail -1 || echo "0")
          ERRORS=$(grep -oP 'Errors: \K[0-9]+' test-output.txt | tail -1 || echo "0")
          SKIPPED=$(grep -oP 'Skipped: \K[0-9]+' test-output.txt | tail -1 || echo "0")
          PASSED=$((TESTS - FAILURES - ERRORS - SKIPPED))
          echo "tests=$TESTS"       >> $GITHUB_OUTPUT
          echo "passed=$PASSED"     >> $GITHUB_OUTPUT
          echo "failures=$FAILURES" >> $GITHUB_OUTPUT
          echo "errors=$ERRORS"     >> $GITHUB_OUTPUT
          echo "skipped=$SKIPPED"   >> $GITHUB_OUTPUT

      - name: Write run summary
        if: always()
        run: |
          TESTS=${{ steps.parse.outputs.tests }}
          PASSED=${{ steps.parse.outputs.passed }}
          FAILURES=${{ steps.parse.outputs.failures }}
          ERRORS=${{ steps.parse.outputs.errors }}
          SKIPPED=${{ steps.parse.outputs.skipped }}
          EXECUTED=$((TESTS - SKIPPED))
          PASS_RATE=0
          [ "$EXECUTED" -gt 0 ] && PASS_RATE=$(echo "scale=1; $PASSED * 100 / $EXECUTED" | bc)
          [ "$FAILURES" -eq 0 ] && [ "$ERRORS" -eq 0 ] && OVERALL="✅ All Passed" || OVERALL="❌ Some Failed"

          PR_LINK=""
          [ "${{ github.event_name }}" = "pull_request" ] && \
            PR_LINK="| 🔀 Pull Request | [#${{ github.event.pull_request.number }}](${{ github.event.pull_request.html_url }}) |"

          cat >> $GITHUB_STEP_SUMMARY << EOF
          # ⚡ Sanity Run Summary
          | Field | Value |
          |-------|-------|
          | 📅 Date | $(date -u '+%Y-%m-%d %H:%M UTC') |
          | 🌿 Branch | \`${{ needs.resolve-branch.outputs.branch }}\` |
          | 🏷️ Test Type | \`${{ inputs.tag != '' && inputs.tag || 'sanity' }}\` |
          | 🔀 Trigger | \`${{ github.event_name }}\` |
          | 🌐 Base URL | ${{ env.BASE_URL }} |
          | 📊 Overall Status | $OVERALL |
          $PR_LINK

          ## 📈 Results
          | Metric | Count |
          |--------|-------|
          | Total Tests | $TESTS |
          | ✅ Passed | $PASSED |
          | ❌ Failed | $FAILURES |
          | 🔴 Errors | $ERRORS |
          | ⏭️ Skipped | $SKIPPED |
          | 📊 Pass Rate | $PASS_RATE% |

          ## 🔗 Reports
          | Report | Link |
          |--------|------|
          | Sanity Report | [View](https://Phillmon8917.github.io/phptravels-reports/sanity-report/index.html) |
          EOF

      - name: Generate Allure report
        if: always()
        run: mvn allure:report

      - name: Set run metadata
        if: always()
        run: |
          TESTS=${{ steps.parse.outputs.tests }}
          PASSED=${{ steps.parse.outputs.passed }}
          FAILURES=${{ steps.parse.outputs.failures }}
          ERRORS=${{ steps.parse.outputs.errors }}
          SKIPPED=${{ steps.parse.outputs.skipped }}
          # Pass rate denominator excludes skipped — they did not run
          EXECUTED=$((TESTS - SKIPPED))
          PASS_RATE=0
          [ "$EXECUTED" -gt 0 ] && PASS_RATE=$(echo "scale=1; $PASSED * 100 / $EXECUTED" | bc)
          # Broken/timeout tests surface as ERRORS in Surefire — treat as failures
          [ "$FAILURES" -eq 0 ] && [ "$ERRORS" -eq 0 ] && STATUS="passed" || STATUS="failed"

          echo "RUN_ID=${{ github.run_id }}"                                    >> $GITHUB_ENV
          echo "RUN_DATE=$(date -u '+%Y-%m-%dT%H:%M:%SZ')"                     >> $GITHUB_ENV
          echo "REPORT_DATE=$(date -u '+%Y-%m-%d %H:%M UTC')"                  >> $GITHUB_ENV
          echo "META_BRANCH=${{ needs.resolve-branch.outputs.branch }}"         >> $GITHUB_ENV
          echo "META_TAG=${{ inputs.tag != '' && inputs.tag || 'sanity' }}"     >> $GITHUB_ENV
          echo "META_TRIGGER=${{ github.event_name }}"                          >> $GITHUB_ENV
          echo "META_TESTS=$TESTS"                                              >> $GITHUB_ENV
          echo "META_PASSED=$PASSED"                                            >> $GITHUB_ENV
          echo "META_FAILURES=$FAILURES"                                        >> $GITHUB_ENV
          echo "META_ERRORS=$ERRORS"                                            >> $GITHUB_ENV
          echo "META_SKIPPED=$SKIPPED"                                          >> $GITHUB_ENV
          echo "META_STATUS=$STATUS"                                            >> $GITHUB_ENV
          echo "META_PASS_RATE=$PASS_RATE"                                      >> $GITHUB_ENV

      - name: Checkout gh-pages from phptravels-reports
        if: always()
        uses: actions/checkout@v4
        with:
          repository: Phillmon8917/phptravels-reports
          ref: gh-pages
          path: gh-pages
          token: ${{ secrets.DATA_REPO_TOKEN }}
        continue-on-error: true

      - name: Assemble Pages directory
        if: always()
        run: |
          RUN_ID="${{ env.RUN_ID }}"

          # --- Copy Allure artefacts ---
          mkdir -p "gh-pages/sanity-reports/${RUN_ID}"
          cp -r target/site/allure-maven-plugin/. "gh-pages/sanity-reports/${RUN_ID}/"

          mkdir -p gh-pages/sanity-report
          cp -r target/site/allure-maven-plugin/. gh-pages/sanity-report/

          # --- Initialise JSON files if absent ---
          [ -f gh-pages/sanity-runs.json      ] || echo "[]" > gh-pages/sanity-runs.json
          [ -f gh-pages/regression-runs.json  ] || echo "[]" > gh-pages/regression-runs.json
          [ -f gh-pages/monthly-runs.json     ] || echo "[]" > gh-pages/monthly-runs.json

          # --- Update sanity run history ---
          python3 - << PYEOF
          import json, os, shutil

          run_id   = os.environ['RUN_ID']
          run_date = os.environ['RUN_DATE']
          branch   = os.environ['META_BRANCH']
          tag      = os.environ['META_TAG']
          trigger  = os.environ['META_TRIGGER']
          status   = os.environ['META_STATUS']
          tests    = int(os.environ['META_TESTS'])
          passed   = int(os.environ['META_PASSED'])
          failures = int(os.environ['META_FAILURES'])
          errors   = int(os.environ['META_ERRORS'])
          skipped  = int(os.environ['META_SKIPPED'])
          pass_rate = os.environ['META_PASS_RATE']

          runs_path = 'gh-pages/sanity-runs.json'
          with open(runs_path) as f:
            runs = json.load(f)

          runs.insert(0, {
            'id': run_id, 'date': run_date, 'branch': branch, 'tag': tag,
            'trigger': trigger, 'status': status, 'tests': tests, 'passed': passed,
            'failures': failures, 'errors': errors, 'skipped': skipped,
            'passRate': pass_rate, 'reportPath': f'sanity-reports/{run_id}/index.html'
          })

          if len(runs) > 50:
            for r in runs[50:]:
              old = 'gh-pages/' + r['reportPath'].replace('/index.html','')
              if os.path.isdir(old):
                shutil.rmtree(old)
            runs = runs[:50]

          with open(runs_path, 'w') as f:
            json.dump(runs, f, indent=2)
          PYEOF

          # --- Render history pages from template ---
          TMPL=".github/templates/history.html"
          REPORT_DATE="${{ env.REPORT_DATE }}"

          sed -e 's|%%TITLE%%|Sanity|g' \
              -e 's|%%ICON%%|⚡|g' \
              -e 's|%%ACCENT%%|#7c9eff|g' \
              -e "s|%%DATE%%|${REPORT_DATE}|g" \
              -e 's|%%DATA_FILE%%|sanity-runs.json|g' \
              "$TMPL" > gh-pages/sanity-history.html

          # Only create these if they don't already exist (regression workflow owns them)
          [ -f gh-pages/regression-history.html ] || \
            sed -e 's|%%TITLE%%|Regression|g' \
                -e 's|%%ICON%%|🧪|g' \
                -e 's|%%ACCENT%%|#4fffb0|g' \
                -e "s|%%DATE%%|${REPORT_DATE}|g" \
                -e 's|%%DATA_FILE%%|regression-runs.json|g' \
                "$TMPL" > gh-pages/regression-history.html

          [ -f gh-pages/monthly-history.html ] || \
            sed -e 's|%%TITLE%%|Monthly|g' \
                -e 's|%%ICON%%|📊|g' \
                -e 's|%%ACCENT%%|#ffb84f|g' \
                -e "s|%%DATE%%|${REPORT_DATE}|g" \
                -e 's|%%DATA_FILE%%|monthly-runs.json|g' \
                "$TMPL" > gh-pages/monthly-history.html

          # --- Render dashboard index from template ---
          sed "s|%%DATE%%|${REPORT_DATE}|g" \
              .github/templates/index.html > gh-pages/index.html

      - name: Deploy to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.DATA_REPO_TOKEN }}
          external_repository: Phillmon8917/phptravels-reports
          publish_branch: gh-pages
          publish_dir: gh-pages/
          keep_files: true

      - name: Upload Allure report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-sanity
          path: target/site/allure-maven-plugin/
          retention-days: 7
